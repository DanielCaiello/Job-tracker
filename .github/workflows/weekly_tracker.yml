name: Weekly Job Tracker

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 8:00 AM ET (13:00 UTC)
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Run job tracker
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_tracker.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job_tracker_log.csv
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "tracker: weekly run $(date +'%Y-%m-%d')" && git push
