<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { color: #94a3b8; font-size: 0.9rem; margin-top: 0.25rem; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #2d3450;
      margin-bottom: 2rem;
    }
    .tab-btn {
      padding: 0.5rem 1.1rem;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover  { color: #cbd5e1; }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Run selector ── */
    .run-selector {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .run-selector label { color: #94a3b8; font-size: 0.85rem; }
    .run-select {
      background: #1e2130;
      border: 1px solid #2d3450;
      color: #e2e8f0;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #1e2130;
      border: 1px solid #2d3450;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }
    .card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .card .value { font-size: 2rem; font-weight: 700; }
    .card .value.green  { color: #4ade80; }
    .card .value.blue   { color: #60a5fa; }
    .card .value.yellow { color: #fbbf24; }

    /* ── Trend chart ── */
    .full-card {
      background: #1e2130;
      border: 1px solid #2d3450;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .full-card h2 { font-size: 0.95rem; color: #94a3b8; margin-bottom: 1rem; font-weight: 600; }
    .full-card canvas { max-height: 240px; }

    /* ── New companies table ── */
    .list-card {
      background: #1e2130;
      border: 1px solid #2d3450;
      border-radius: 10px;
      padding: 1.5rem;
    }
    .list-card h2 { font-size: 0.95rem; color: #94a3b8; margin-bottom: 1rem; font-weight: 600; }

    .company-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .company-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: #64748b;
      font-weight: 600;
      border-bottom: 1px solid #2d3450;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .company-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #1a1f2e;
      color: #e2e8f0;
    }
    .company-table tr:last-child td { border-bottom: none; }
    .company-table tr:hover td { background: #252a3a; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(74,222,128,0.15);
      color: #4ade80;
    }

    .muted { color: #64748b; font-size: 0.85rem; padding: 0.75rem 0; font-style: italic; }

    #error-msg {
      display: none;
      background: #2a1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 1.5rem 2rem;
      color: #fca5a5;
    }
    #error-msg code { background: #1a0f0f; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Job Tracker Dashboard</h1>
  <p>New companies posting jobs with a keyword, week over week</p>
</header>

<div id="error-msg">
  <strong>Could not load data.</strong><br><br>
  Make sure <code>job_tracker_log.csv</code> is committed to the repo and GitHub Pages is enabled.
</div>

<div id="app" style="display:none">
  <div class="tab-bar" id="tab-bar"></div>
  <div id="tab-panels"></div>
</div>

<script>
const COLORS = [
  "#60a5fa","#4ade80","#fbbf24","#f87171","#a78bfa",
  "#34d399","#fb923c","#e879f9","#38bdf8","#facc15",
];

// Per-keyword chart instances keyed by keyword
const charts = {};

function destroyChart(c) { if (c) c.destroy(); }

function parseList(raw) {
  if (!raw) return [];
  return raw.split(";").map(s => s.trim()).filter(Boolean);
}

function processRows(rows) {
  return rows.map(r => ({
    date:             r.date,
    keyword:          r.keyword,
    country:          r.country || "us",
    total_raw:        +r.total_raw || 0,
    total_filtered:   +r.total_filtered || 0,
    excluded_count:   +r.excluded_count || 0,
    total_companies:  +r.total_companies || 0,
    new_company_count: r.new_company_count !== "" ? +r.new_company_count : null,
    new_companies:    parseList(r.new_companies),
  }));
}

function groupByKeyword(rows) {
  const map = {};
  for (const r of rows) {
    if (!map[r.keyword]) map[r.keyword] = [];
    map[r.keyword].push(r);
  }
  return map;
}

function renderRun(keyword, run) {
  const isBaseline = run.new_company_count === null;

  document.getElementById(`c-new-${keyword}`).textContent      = isBaseline ? "—" : run.new_company_count.toLocaleString();
  document.getElementById(`c-total-${keyword}`).textContent    = run.total_companies.toLocaleString();
  document.getElementById(`c-listings-${keyword}`).textContent = run.total_filtered.toLocaleString();
  document.getElementById(`new-badge-${keyword}`).textContent  = isBaseline ? "baseline" : run.new_companies.length;

  const listEl = document.getElementById(`company-list-${keyword}`);
  if (isBaseline) {
    listEl.innerHTML = `<p class="muted">Baseline run — ${run.total_companies.toLocaleString()} companies recorded as the starting point. New companies appear from next week's run.</p>`;
  } else if (!run.new_companies.length) {
    listEl.innerHTML = `<p class="muted">No new companies this week.</p>`;
  } else {
    const rows = run.new_companies.map((name, i) =>
      `<tr><td>${i + 1}</td><td>${name}</td></tr>`
    ).join("");
    listEl.innerHTML = `<table class="company-table"><thead><tr><th>#</th><th>Company</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
}

function renderTrend(keyword, runs) {
  const section = document.getElementById(`trend-${keyword}`);
  const compRuns = runs.filter(r => r.new_company_count !== null);
  if (!compRuns.length) { section.style.display = "none"; return; }
  section.style.display = "";

  destroyChart(charts[`trend-${keyword}`]);
  charts[`trend-${keyword}`] = new Chart(document.getElementById(`trend-chart-${keyword}`), {
    type: "line",
    data: {
      labels: compRuns.map(r => r.date),
      datasets: [
        {
          label: "New Companies",
          data: compRuns.map(r => r.new_company_count),
          borderColor: "#4ade80",
          backgroundColor: "rgba(74,222,128,0.1)",
          fill: true, tension: 0.3, pointRadius: 5,
        },
        {
          label: "Total Companies",
          data: compRuns.map(r => r.total_companies),
          borderColor: "#60a5fa",
          backgroundColor: "rgba(96,165,250,0.07)",
          fill: true, tension: 0.3, pointRadius: 5,
        },
      ],
    },
    options: {
      plugins: { legend: { labels: { color: "#94a3b8" } } },
      scales: {
        x: { ticks: { color: "#94a3b8" }, grid: { color: "#2d3450" } },
        y: { ticks: { color: "#94a3b8" }, grid: { color: "#2d3450" }, beginAtZero: true },
      },
    },
  });
}

function buildPanel(keyword, runs) {
  const id = keyword.replace(/\s+/g, "_");
  const latestIdx = runs.length - 1;

  // Build run selector options
  const options = runs.map((r, i) => {
    const label = r.new_company_count === null
      ? `${r.date} (baseline)`
      : `${r.date} (+${r.new_company_count} new)`;
    return `<option value="${i}"${i === latestIdx ? " selected" : ""}>${label}</option>`;
  }).join("");

  return `
    <div class="tab-panel" id="panel-${id}">
      <div class="run-selector">
        <label for="run-select-${id}">Viewing run:</label>
        <select class="run-select" id="run-select-${id}">${options}</select>
      </div>

      <div class="cards">
        <div class="card"><div class="label">New Companies</div><div class="value green" id="c-new-${id}">—</div></div>
        <div class="card"><div class="label">Total Companies</div><div class="value blue" id="c-total-${id}">—</div></div>
        <div class="card"><div class="label">Listings Found</div><div class="value yellow" id="c-listings-${id}">—</div></div>
      </div>

      <div class="full-card" id="trend-${id}">
        <h2>New Companies Week Over Week</h2>
        <canvas id="trend-chart-${id}"></canvas>
      </div>

      <div class="list-card">
        <h2>New Companies This Run <span class="badge" id="new-badge-${id}">0</span></h2>
        <div id="company-list-${id}"></div>
      </div>
    </div>`;
}

function switchTab(keyword) {
  const id = keyword.replace(/\s+/g, "_");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`tab-${id}`).classList.add("active");
  document.getElementById(`panel-${id}`).classList.add("active");
}

function init(allRows) {
  const rows    = processRows(allRows);
  const grouped = groupByKeyword(rows);
  const keywords = Object.keys(grouped);

  if (!keywords.length) {
    document.getElementById("error-msg").style.display = "block";
    return;
  }

  document.getElementById("app").style.display = "block";

  const tabBar   = document.getElementById("tab-bar");
  const panels   = document.getElementById("tab-panels");

  keywords.forEach((kw, i) => {
    const id = kw.replace(/\s+/g, "_");
    const runs = grouped[kw];

    // Tab button
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i === 0 ? " active" : "");
    btn.id = `tab-${id}`;
    btn.textContent = kw;
    btn.addEventListener("click", () => switchTab(kw));
    tabBar.appendChild(btn);

    // Panel HTML
    panels.insertAdjacentHTML("beforeend", buildPanel(id, runs));

    // Make first panel visible
    if (i === 0) document.getElementById(`panel-${id}`).classList.add("active");

    // Initial render
    renderTrend(id, runs);
    renderRun(id, runs[runs.length - 1]);

    // Run selector change handler
    document.getElementById(`run-select-${id}`).addEventListener("change", e => {
      renderRun(id, runs[Number(e.target.value)]);
    });
  });
}

Papa.parse("job_tracker_log.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: results => init(results.data),
  error: () => { document.getElementById("error-msg").style.display = "block"; },
});
</script>
</body>
</html>
